when:
  - event: pull_request
  - event: push
    branch: main

clone:
  - name: git
    image: woodpeckerci/plugin-git
    settings:
      recursive: true
      submodule_override:
        posts: https://github.com/LarssonOliver/blg-content.git

steps:
  - name: install
    image: node:24-alpine
    commands:
      - npm ci
    backend_options: &backops
      kubernetes:
        tolerations:
          - key: amd64
            value: "true"
            effect: PreferNoSchedule
        nodeSelector:
          kubernetes.io/arch: amd64

  - name: build
    image: node:24-alpine
    commands:
      - npm run build
    backend_options: *backops
